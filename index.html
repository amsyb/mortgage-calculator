<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans&display=swap"
      rel="stylesheet"
    />

    <title>Frontend Mentor | Mortgage repayment calculator</title>
  </head>
  <body>
    <section class="left">
      <div class="header">
        <h1>Mortgage Calculator</h1>
        <a href="" class="link">Clear All</a>
      </div>

      <div class="fw-field">
        <label for="" class="field-label">Mortgage Amount</label>
        <input type="text" />
      </div>

      <div class="field-hf">
        <label for="" class="field-stack"
          >Mortgage Term <input type="text" />
        </label>
        <label for="" class="field-stack"
          >Interest Rate <input type="text" name="" id=""
        /></label>
      </div>
      <div class="mortgage-type">
        <h2>Mortgage Type</h2>
        <div class="radio-btns">
          <div class="field-radio">
            <label for="" class="radio-title">
              <input type="radio" name="repayment" value="repayment" />
              Repayment
            </label>
          </div>
          <div class="field-radio">
            <label for="" class="radio-title">
              <input type="radio" name="repayment" value="repayment" />
              Interest Only
            </label>
          </div>
        </div>
      </div>
      <button>Calculate Payments</button>
    </section>
  </body>
</html>
