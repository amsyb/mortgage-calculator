<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="styles.css" />

    <title>Frontend Mentor | Mortgage repayment calculator</title>

    <style>
      .attribution {
        font-size: 11px;
        text-align: center;
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>Mortgage Calculator</h1>
      <a href="">Clear All</a>
    </div>

    <div class="fw-field">
      <label for="" class="field-label">Mortgage Amount</label>
      <input type="text" />
    </div>

    <div class="field-hf">
      <label for="" class="field-stack"
        >Mortgage Term <input type="text" />
      </label>
      <label for="" class="field-stack"
        >Interest Rate <input type="text" name="" id=""
      /></label>
    </div>
    <h2>Mortgage Type</h2>
    <label for="">
      <input type="radio" name="repayment" value="repayment" /> Repayment
    </label>
    <label for="">
      <input type="radio" name="repayment" value="repayment" /> Interest Only
    </label>
    <button>Calculate Payments</button>
  </body>
</html>
